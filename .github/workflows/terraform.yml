name: Terraform Deploy

on:
  push:
    branches:
      - main

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # 🔥 REQUIRED for OIDC
      contents: read

    defaults:
      run:
        working-directory: terraform/environments/prod

    steps:
      
      # Checkout Code
      
      - name: Checkout code
        uses: actions/checkout@v4

      
      # Setup Terraform
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      
      # Configure AWS (OIDC)
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::786827631657:role/github-actions-terraform
          aws-region: eu-west-1

      - name: Terraform Import Existing SG
        run: |
         terraform import module.alb.aws_security_group.alb_sg sg-09b93f9be1ee2b232 || echo "Already imported"

      
      # Terraform Init
      
      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/prod

      
      # Terraform Plan
      
      - name: Terraform Plan
        run: terraform plan
        working-directory: terraform/environments/prod

      
      # Terraform Apply
      
      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform/environments/prod
